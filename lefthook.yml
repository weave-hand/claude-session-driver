pre-commit:
  parallel: true
  commands:
    biome:
      glob: '*.{ts,json}'
      run: pnpm biome check {staged_files}
      stage_fixed: true
    typecheck:
      glob: '*.ts'
      run: pnpm tsc --noEmit
pre-push:
  piped: true
  commands:
    build-dist:
      priority: 1
      run: pnpm run dist:check
    test:
      priority: 2
      run: pnpm vitest run --reporter=dot
