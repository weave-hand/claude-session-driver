name: CI
on:
  pull_request:
  push:
    branches: [main]
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        # package-manager-cache defaults to true and tries to resolve pnpm before
        # corepack installs it (the packageManager field) -> "Unable to locate
        # executable file: pnpm". Disable it; corepack provides pnpm below.
        with: { node-version: '22', package-manager-cache: false }
      - run: corepack enable && corepack prepare pnpm@10.32.1 --activate
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm run dist:check
      - run: pnpm test
